<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SIGNALS HUB - Static Logo Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .logo-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .logo-title {
            text-align: center;
            color: #1F2937;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .logo-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 20px;
            background: #F9FAFB;
            border-radius: 15px;
        }

        /* Version 1 - Gray waves, orange bars, green base */
        .logo-v1 {
            position: relative;
            width: 100px;
            height: 100px;
            flex-shrink: 0;
        }

        .v1-wave {
            position: absolute;
            border-radius: 50%;
            border: 3px solid #4B5563;
            opacity: 0.4;
        }

        .v1-wave-1 {
            width: 100px;
            height: 100px;
            top: 0;
            left: 0;
        }

        .v1-wave-2 {
            width: 75px;
            height: 75px;
            top: 12.5px;
            left: 12.5px;
        }

        .v1-base {
            position: absolute;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #10B981, #059669);
            border-radius: 15px;
            top: 17.5px;
            left: 17.5px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 10px;
            gap: 3px;
        }

        .v1-bar {
            width: 6px;
            border-radius: 3px;
            background: linear-gradient(to top, #EF4444, #F97316);
        }

        .v1-bar-1 { height: 15px; }
        .v1-bar-2 { height: 25px; }
        .v1-bar-3 { height: 18px; }
        .v1-bar-4 { height: 30px; }

        /* Version 2 - Orange waves, gray base, orange bars */
        .logo-v2 {
            position: relative;
            width: 100px;
            height: 100px;
            flex-shrink: 0;
        }

        .v2-wave {
            position: absolute;
            border-radius: 50%;
            border: 3px solid #F97316;
            opacity: 0.6;
        }

        .v2-wave-1 {
            width: 100px;
            height: 100px;
            top: 0;
            left: 0;
        }

        .v2-wave-2 {
            width: 80px;
            height: 80px;
            top: 10px;
            left: 10px;
        }

        .v2-base {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1F2937, #374151);
            border-radius: 13px;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 10px;
            gap: 3px;
        }

        .v2-bar {
            width: 5px;
            border-radius: 2px;
            background: linear-gradient(to top, #F97316, #EF4444);
        }

        .v2-bar-1 { height: 12px; }
        .v2-bar-2 { height: 22px; }
        .v2-bar-3 { height: 16px; }
        .v2-bar-4 { height: 26px; }
        .v2-bar-5 { height: 19px; }

        /* Version 3 - Green base, orange waves, orange bars */
        .logo-v3 {
            position: relative;
            width: 100px;
            height: 100px;
            flex-shrink: 0;
        }

        .v3-circle {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10B981, #059669);
            border-radius: 50%;
            top: 10px;
            left: 10px;
        }

        .v3-wave {
            position: absolute;
            border-radius: 50%;
            border: 3px solid #F97316;
            opacity: 0.5;
        }

        .v3-wave-1 {
            width: 100px;
            height: 100px;
            top: 0;
            left: 0;
        }

        .v3-data {
            position: absolute;
            width: 50px;
            height: 50px;
            top: 25px;
            left: 25px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            z-index: 10;
        }

        .v3-bar {
            width: 5px;
            border-radius: 2px;
            background: linear-gradient(to top, #EF4444, #F97316);
        }

        .v3-bar-1 { height: 12px; }
        .v3-bar-2 { height: 22px; }
        .v3-bar-3 { height: 16px; }
        .v3-bar-4 { height: 26px; }
        .v3-bar-5 { height: 18px; }
        .v3-bar-6 { height: 21px; }

        .logo-text {
            font-size: 1.8em;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo-text.v1 .ai { color: #F97316; }
        .logo-text.v1 .signals { color: #1F2937; }
        .logo-text.v1 .hub { color: #1F2937; }

        .logo-text.v2 .ai { color: #F97316; }
        .logo-text.v2 .signals { color: #1F2937; }
        .logo-text.v2 .hub { color: #374151; }

        .logo-text.v3 .ai { color: #10B981; }
        .logo-text.v3 .signals { color: #F97316; }
        .logo-text.v3 .hub { color: #1F2937; }

        .description {
            text-align: center;
            color: #6B7280;
            font-size: 0.9em;
            line-height: 1.6;
            padding: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI SIGNALS HUB - 靜態 LOGO 展示</h1>
        
        <div class="logo-grid">
            <!-- Version 1 -->
            <div class="logo-card">
                <div class="logo-title">Version 1 - Enhanced</div>
                <div class="logo-display">
                    <div class="logo-v1">
                        <div class="v1-wave v1-wave-1"></div>
                        <div class="v1-wave v1-wave-2"></div>
                        <div class="v1-base">
                            <div class="v1-bar v1-bar-1"></div>
                            <div class="v1-bar v1-bar-2"></div>
                            <div class="v1-bar v1-bar-3"></div>
                            <div class="v1-bar v1-bar-4"></div>
                        </div>
                    </div>
                    <div class="logo-text v1">
                        <span class="ai">AI</span> <span class="signals">SIGNALS</span>
                    </div>
                </div>
                <p class="description">
                    深灰廣播波紋底，綠色方形座，橙紅柱狀圖
                </p>
            </div>

            <!-- Version 2 -->
            <div class="logo-card">
                <div class="logo-title">Version 2 - Professional</div>
                <div class="logo-display">
                    <div class="logo-v2">
                        <div class="v2-wave v2-wave-1"></div>
                        <div class="v2-wave v2-wave-2"></div>
                        <div class="v2-base">
                            <div class="v2-bar v2-bar-1"></div>
                            <div class="v2-bar v2-bar-2"></div>
                            <div class="v2-bar v2-bar-3"></div>
                            <div class="v2-bar v2-bar-4"></div>
                            <div class="v2-bar v2-bar-5"></div>
                        </div>
                    </div>
                    <div class="logo-text v2">
                        <span class="ai">AI</span> <span class="signals">SIGNALS</span>
                    </div>
                </div>
                <p class="description">
                    橙色波紋圈，深灰方形座，橙紅柱狀圖
                </p>
            </div>

            <!-- Version 3 -->
            <div class="logo-card">
                <div class="logo-title">Version 3 - Hybrid</div>
                <div class="logo-display">
                    <div class="logo-v3">
                        <div class="v3-circle"></div>
                        <div class="v3-wave v3-wave-1"></div>
                        <div class="v3-data">
                            <div class="v3-bar v3-bar-1"></div>
                            <div class="v3-bar v3-bar-2"></div>
                            <div class="v3-bar v3-bar-3"></div>
                            <div class="v3-bar v3-bar-4"></div>
                            <div class="v3-bar v3-bar-5"></div>
                            <div class="v3-bar v3-bar-6"></div>
                        </div>
                    </div>
                    <div class="logo-text v3">
                        <span class="ai">AI</span> <span class="signals">SIGNALS</span>
                    </div>
                </div>
                <p class="description">
                    綠色圓底，橙色波紋圈，橙紅柱狀圖
                </p>
            </div>
        </div>
    </div>
</body>
</html>
