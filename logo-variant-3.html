<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SIGNALS HUB - Logo Variant 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            background: white;
            border-radius: 30px;
            padding: 60px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            color: #1F2937;
            font-size: 2.2em;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            background: linear-gradient(135deg, #10B981, #F97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.3em;
            margin-bottom: 50px;
            font-weight: 600;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 50px;
        }

        .logo-icon {
            position: relative;
            width: 120px;
            height: 120px;
        }

        /* Mixed design - green base with orange/red elements */
        .base-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10B981, #059669);
            border-radius: 50%;
            top: 10px;
            left: 10px;
            z-index: 1;
        }

        /* Animated signal rings - orange */
        .signal-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid #F97316;
            top: 0;
            left: 0;
        }

        .ring-1 {
            width: 120px;
            height: 120px;
            animation: signalPulse 2.5s ease-out infinite;
        }

        .ring-2 {
            width: 120px;
            height: 120px;
            animation: signalPulse 2.5s ease-out infinite 0.5s;
        }

        @keyframes signalPulse {
            0% {
                transform: scale(0.6);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
            }
        }

        /* Center data visualization */
        .data-visual {
            position: absolute;
            width: 60px;
            height: 60px;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            z-index: 10;
        }

        .mini-bar {
            width: 6px;
            border-radius: 3px;
            background: linear-gradient(to top, #EF4444, #F97316);
            animation: barBounce 1.5s ease-in-out infinite;
        }

        .mini-bar-1 { height: 15px; animation-delay: 0s; }
        .mini-bar-2 { height: 28px; animation-delay: 0.15s; }
        .mini-bar-3 { height: 20px; animation-delay: 0.3s; }
        .mini-bar-4 { height: 32px; animation-delay: 0.45s; }
        .mini-bar-5 { height: 22px; animation-delay: 0.6s; }
        .mini-bar-6 { height: 26px; animation-delay: 0.75s; }

        @keyframes barBounce {
            0%, 100% { 
                opacity: 0.7;
            }
            50% { 
                opacity: 1;
                transform: scaleY(1.2);
            }
        }

        .logo-text {
            font-size: 2.5em;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo-text .ai {
            color: #10B981;
        }

        .logo-text .signals {
            color: #F97316;
        }

        .logo-text .hub {
            color: #1F2937;
        }

        .description {
            text-align: center;
            color: #6B7280;
            font-size: 1em;
            line-height: 1.8;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .feature {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .feature-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #10B981, #F97316);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .feature-icon::after {
            content: '✓';
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .feature-content h3 {
            color: #1F2937;
            font-size: 1.1em;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .feature-content p {
            color: #6B7280;
            font-size: 0.95em;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI SIGNALS HUB</h1>
        <div class="subtitle">Signal Data Analyzer - Variant 3</div>
        
        <div class="logo-container">
            <div class="logo-icon">
                <!-- Base green circle -->
                <div class="base-circle"></div>
                
                <!-- Signal rings -->
                <div class="signal-ring ring-1"></div>
                <div class="signal-ring ring-2"></div>
                
                <!-- Center data visualization -->
                <div class="data-visual">
                    <div class="mini-bar mini-bar-1"></div>
                    <div class="mini-bar mini-bar-2"></div>
                    <div class="mini-bar mini-bar-3"></div>
                    <div class="mini-bar mini-bar-4"></div>
                    <div class="mini-bar mini-bar-5"></div>
                    <div class="mini-bar mini-bar-6"></div>
                </div>
            </div>
            
            <div class="logo-text">
                <span class="ai">AI</span> <span class="signals">SIGNALS</span> <span class="hub">HUB</span>
            </div>
        </div>

        <p class="description">
            設計概念：混合設計風格，綠色圓形底座搭配橙色信號波紋及橙紅色數據柱。
            結合三種元素：信號傳播、數據分析、盈利成長，展現平台完整功能。
        </p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon"></div>
                <div class="feature-content">
                    <h3>Hybrid Design</h3>
                    <p>綠色底座搭配橙色波紋與數據</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon"></div>
                <div class="feature-content">
                    <h3>Complete Integration</h3>
                    <p>整合信號、分析、盈利三大元素</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon"></div>
                <div class="feature-content">
                    <h3>Dynamic Elements</h3>
                    <p>多層次動畫展現複雜功能</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon"></div>
                <div class="feature-content">
                    <h3>Balanced Colors</h3>
                    <p>綠色橙色均衡配搭</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
