<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SIGNALS HUB - Logo Scheme 3 Enhanced v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 900px;
            background: white;
            border-radius: 30px;
            padding: 60px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }
        
        h1 {
            text-align: center;
            color: #1F2937;
            font-size: 2.2em;
            margin-bottom: 15px;
        }
        
        .subtitle {
            text-align: center;
            color: #FF6B35;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 50px;
        }
        
        /* Enhanced Logo Design */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            position: relative;
            min-height: 100px;
        }
        
        .logo-icon-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
        }
        
        /* Broadcast Signal Icon (Background/底層) */
        .broadcast-icon {
            width: 80px;
            height: 80px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .broadcast-circle {
            position: absolute;
            border: 2px solid #6B7280;
            border-radius: 50%;
            opacity: 0.3;
        }
        
        .broadcast-circle:nth-child(1) {
            width: 32px;
            height: 32px;
            top: 24px;
            left: 24px;
            animation: pulse 2s ease-out infinite;
        }
        
        .broadcast-circle:nth-child(2) {
            width: 56px;
            height: 56px;
            top: 12px;
            left: 12px;
            animation: pulse 2s ease-out 0.5s infinite;
        }
        
        .broadcast-circle:nth-child(3) {
            width: 80px;
            height: 80px;
            top: 0;
            left: 0;
            animation: pulse 2s ease-out 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { opacity: 0.15; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        
        /* Data Analyzer Elements (前面/Foreground) */
        .analyzer-elements {
            position: absolute;
            width: 60px;
            height: 60px;
            top: 10px;
            left: 10px;
            z-index: 10;
        }
        
        /* Bar Chart */
        .bar-chart {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 25px;
        }
        
        .bar {
            flex: 1;
            border-radius: 2px 2px 0 0;
            animation: barGrow 1.5s ease-in-out infinite;
        }
        
        .bar:nth-child(1) { background: #FF6B35; height: 35%; animation-delay: 0s; }
        .bar:nth-child(2) { background: #F7931E; height: 65%; animation-delay: 0.2s; }
        .bar:nth-child(3) { background: #FF6B35; height: 45%; animation-delay: 0.4s; }
        .bar:nth-child(4) { background: #DC2626; height: 80%; animation-delay: 0.6s; }
        .bar:nth-child(5) { background: #F7931E; height: 55%; animation-delay: 0.8s; }
        
        @keyframes barGrow {
            0%, 100% { transform: scaleY(0.9); opacity: 0.7; }
            50% { transform: scaleY(1.05); opacity: 1; }
        }
        
        /* Waveform */
        .waveform {
            position: absolute;
            bottom: 8px;
            left: 5px;
            right: 5px;
            height: 18px;
        }
        
        .wave-path {
            stroke: #4B5563;
            stroke-width: 2.5;
            fill: none;
            animation: waveAnimation 2s ease-in-out infinite;
        }
        
        @keyframes waveAnimation {
            0%, 100% { opacity: 0.5; stroke-dashoffset: 0; }
            50% { opacity: 0.9; }
        }
        
        /* Logo Text */
        .logo-text {
            font-size: 2.5em;
            font-weight: 800;
            color: #374151;
            letter-spacing: -1px;
        }
        
        .logo-text .ai {
            color: #FF6B35;
        }
        
        .logo-text .signals {
            color: #F7931E;
            font-weight: 900;
        }
        
        /* Features */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .feature-icon {
            width: 24px;
            height: 24px;
            background: #FF6B35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8em;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .feature-text {
            flex: 1;
        }
        
        .feature-text strong {
            color: #1F2937;
            display: block;
            margin-bottom: 4px;
        }
        
        .feature-text span {
            color: #6B7280;
            font-size: 0.9em;
        }
        
        .description {
            text-align: center;
            color: #6B7280;
            line-height: 1.8;
            font-size: 1.05em;
            padding: 0 20px;
        }
        
        .description strong {
            color: #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI SIGNALS HUB</h1>
        <div class="subtitle">Signal Data Analyzer Enhanced v2</div>
        
        <div class="logo-container">
            <!-- Logo Icon Wrapper -->
            <div class="logo-icon-wrapper">
                <!-- Broadcast Signal Icon (底層/Background) -->
                <div class="broadcast-icon">
                    <div class="broadcast-circle"></div>
                    <div class="broadcast-circle"></div>
                    <div class="broadcast-circle"></div>
                </div>
                
                <!-- Data Analyzer Elements (前面/Foreground) -->
                <div class="analyzer-elements">
                    <!-- Bar Chart -->
                    <div class="bar-chart">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                    
                    <!-- Waveform -->
                    <svg class="waveform" viewBox="0 0 50 18">
                        <path class="wave-path" d="M 0 9 Q 6 3, 12 9 T 24 9 T 36 9 T 50 9"/>
                    </svg>
                </div>
            </div>
            
            <!-- Logo Text -->
            <div class="logo-text">
                <span class="ai">AI</span> <span class="signals">SIGNALS</span> HUB
            </div>
        </div>
        
        <div class="description">
            <strong>設計概念:</strong> 廣播信號圖標作為底層背景（深灰），柱狀圖同波形圖置於前面（橙色、紅色），層次分明。深灰色象徵穩重專業，橙紅色代表活力同警示。移除綠色方形背景，整體更簡潔現代。
        </div>
        
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">
                    <strong>Layered Design</strong>
                    <span>廣播信號底層，數據元素前置</span>
                </div>
            </div>
            
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">
                    <strong>Dynamic Data Elements</strong>
                    <span>橙紅色柱狀圖同深灰波形圖</span>
                </div>
            </div>
            
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">
                    <strong>Professional Colors</strong>
                    <span>深灰、橙、紅配色方案</span>
                </div>
            </div>
            
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">
                    <strong>Clean Modern Look</strong>
                    <span>移除方形背景更簡潔</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
