<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SIGNALS HUB - Logo Scheme 3 Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 900px;
            background: white;
            border-radius: 30px;
            padding: 60px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }
        
        h1 {
            text-align: center;
            color: #1F2937;
            font-size: 2.2em;
            margin-bottom: 15px;
        }
        
        .subtitle {
            text-align: center;
            color: #10B981;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 50px;
        }
        
        /* Enhanced Logo Design */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .logo-icon-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        /* Broadcast Signal Icon */
        .broadcast-icon {
            width: 60px;
            height: 60px;
            position: relative;
        }
        
        .broadcast-circle {
            position: absolute;
            border: 2px solid #10B981;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .broadcast-circle:nth-child(1) {
            width: 24px;
            height: 24px;
            top: 18px;
            left: 18px;
            animation: pulse 2s ease-out infinite;
        }
        
        .broadcast-circle:nth-child(2) {
            width: 42px;
            height: 42px;
            top: 9px;
            left: 9px;
            animation: pulse 2s ease-out 0.5s infinite;
        }
        
        .broadcast-circle:nth-child(3) {
            width: 60px;
            height: 60px;
            top: 0;
            left: 0;
            animation: pulse 2s ease-out 1s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        /* Data Analyzer Elements */
        .analyzer-icon {
            width: 60px;
            height: 60px;
            position: relative;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .waveform {
            position: absolute;
            bottom: 8px;
            left: 8px;
            right: 8px;
            height: 20px;
        }
        
        .wave-path {
            stroke: white;
            stroke-width: 2;
            fill: none;
            animation: waveAnimation 2s ease-in-out infinite;
        }
        
        @keyframes waveAnimation {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .bar-chart {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 22px;
        }
        
        .bar {
            flex: 1;
            background: white;
            border-radius: 2px 2px 0 0;
            animation: barGrow 1.5s ease-in-out infinite;
        }
        
        .bar:nth-child(1) { height: 40%; animation-delay: 0s; }
        .bar:nth-child(2) { height: 70%; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 50%; animation-delay: 0.4s; }
        .bar:nth-child(4) { height: 85%; animation-delay: 0.6s; }
        .bar:nth-child(5) { height: 60%; animation-delay: 0.8s; }
        
        @keyframes barGrow {
            0%, 100% { transform: scaleY(0.8); opacity: 0.6; }
            50% { transform: scaleY(1.1); opacity: 1; }
        }
        
        /* Logo Text */
        .logo-text {
            font-size: 2.5em;
            font-weight: 800;
            color: #059669;
            letter-spacing: -1px;
        }
        
        .logo-text .ai {
            color: #10B981;
        }
        
        .logo-text .signals {
            color: #10B981;
            font-weight: 900;
        }
        
        /* Features */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .feature-icon {
            width: 24px;
            height: 24px;
            background: #10B981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8em;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .feature-text {
            flex: 1;
        }
        
        .feature-text strong {
            color: #1F2937;
            display: block;
            margin-bottom: 4px;
        }
        
        .feature-text span {
            color: #6B7280;
            font-size: 0.9em;
        }
        
        .description {
            text-align: center;
            color: #6B7280;
            line-height: 1.8;
            font-size: 1.1em;
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI SIGNALS HUB</h1>
        <div class="subtitle">Signal Data Analyzer Enhanced</div>
        
        <div class="logo-container">
            <!-- Broadcast Signal Icon -->
            <div class="broadcast-icon">
                <div class="broadcast-circle"></div>
                <div class="broadcast-circle"></div>
                <div class="broadcast-circle"></div>
            </div>
            
            <!-- Data Analyzer Icon -->
            <div class="analyzer-icon">
                <div class="bar-chart">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <svg class="waveform" viewBox="0 0 44 20">
                    <path class="wave-path" d="M 0 10 Q 5 5, 10 10 T 20 10 T 30 10 T 44 10"/>
                </svg>
            </div>
            
            <!-- Logo Text -->
            <div class="logo-text">
                <span class="ai">AI</span> <span class="signals">SIGNALS</span> HUB
            </div>
        </div>
        
        <div class="description">
            <strong>設計概念:</strong> 結合信號廣播同數據分析元素，展現平台既雙重功能。脈衝同心圓象徵信號傳播，柱狀圖同波形圖代表數據分析能力。綠色系統一展現盈利成長。
        </div>
        
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">
                    <strong>Signal Broadcasting</strong>
                    <span>脈衝擴散動畫直觀展現信號傳播</span>
                </div>
            </div>
            
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">
                    <strong>Data Analytics</strong>
                    <span>柱狀圖同波形圖展現數據分析功能</span>
                </div>
            </div>
            
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">
                    <strong>Dynamic Elements</strong>
                    <span>多重動畫效果生動有層次感</span>
                </div>
            </div>
            
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <div class="feature-text">
                    <strong>Professional Identity</strong>
                    <span>綠色主題象徵盈利同專業可靠</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
