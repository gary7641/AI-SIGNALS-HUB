<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SIGNALS HUB - Pastel Logo Showcase V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #F9FAFB;
            min-height: 100vh;
            padding: 60px 20px;
            color: #374151;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2.2em; margin-bottom: 60px; font-weight: 800; color: #111827; }
        
        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }
        
        .logo-card {
            background: white;
            border-radius: 32px;
            padding: 50px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #F3F4F6;
        }

        .icon-wrapper {
            width: 140px;
            height: 140px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 35px;
            position: relative;
        }

        .logo-text { font-size: 2em; font-weight: 900; letter-spacing: -0.5px; }

        /* DESIGN D: Fintech & Gold (Pastel Pink) */
        .bg-pink { background: #FCE7F3; } /* 粉紅底 */
        .d-icon { position: relative; width: 80px; height: 80px; }
        .d-crosshair {
            position: absolute; width: 100%; height: 100%;
            border: 2px dashed #F472B6; border-radius: 50%;
        }
        .d-gold {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 35px; height: 50px; background: #F59E0B; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 24px;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
        }
        .text-d .ai { color: #F472B6; }
        .text-d .signals { color: #F59E0B; }

        /* DESIGN E: Big Data Forex (Pastel Blue/Mint) */
        .bg-blue { background: #E0F2FE; } /* 粉藍底 */
        .e-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .e-dot { width: 14px; height: 14px; background: #10B981; border-radius: 3px; opacity: 0.6; }
        .e-dot.active { opacity: 1; transform: scale(1.1); }
        .e-wave {
            position: absolute; width: 110%; height: 4px; background: #0EA5E9;
            top: 50%; left: -5%; transform: rotate(-20deg); border-radius: 2px;
        }
        .text-e .ai { color: #0EA5E9; }
        .text-e .signals { color: #10B981; }

        /* DESIGN F: Smart Analytics (Pastel Purple/Gray) */
        .bg-purple { background: #F3E8FF; } /* 粉紫底 */
        .f-chart { display: flex; align-items: flex-end; gap: 8px; z-index: 2; }
        .f-bar { width: 12px; background: #8B5CF6; border-radius: 6px; }
        .f-ring {
            position: absolute; width: 100px; height: 100px;
            border: 5px solid #9CA3AF; border-radius: 50%; opacity: 0.15;
        }
        .f-ai-eye {
            position: absolute; top: 25px; right: 25px; width: 12px; height: 12px;
            background: #8B5CF6; border-radius: 50%;
        }
        .text-f .ai { color: #8B5CF6; }
        .text-f .signals { color: #6B7280; }

        .tag { font-size: 0.8em; font-weight: 700; color: #9CA3AF; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .desc { font-size: 0.95em; color: #6B7280; text-align: center; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI SIGNALS HUB - 全新粉色系方案</h1>
        
        <div class="logo-grid">
            <!-- 方案 D -->
            <div class="logo-card">
                <div class="tag">方案 D: Fintech Precision</div>
                <div class="icon-wrapper bg-pink">
                    <div class="d-icon">
                        <div class="d-crosshair"></div>
                        <div class="d-gold">$</div>
                    </div>
                </div>
                <div class="logo-text text-d">
                    <span class="ai">AI</span><span class="signals">SIGNALS</span>
                </div>
                <p class="desc">粉紅基調象徵精準度，<br>金磚元素突顯黃金分析價值。</p>
            </div>

            <!-- 方案 E -->
            <div class="logo-card">
                <div class="tag">方案 E: Big Data Forex</div>
                <div class="icon-wrapper bg-blue">
                    <div class="e-wave"></div>
                    <div class="e-grid">
                        <div class="e-dot"></div><div class="e-dot active"></div><div class="e-dot"></div>
                        <div class="e-dot active"></div><div class="e-dot"></div><div class="e-dot active"></div>
                    </div>
                </div>
                <div class="logo-text text-e">
                    <span class="ai">AI</span><span class="signals">SIGNALS</span>
                </div>
                <p class="desc">粉藍與粉綠交織，<br>數據網格展現外幣大數據分析。</p>
            </div>

            <!-- 方案 F -->
            <div class="logo-card">
                <div class="tag">方案 F: Smart Analytics</div>
                <div class="icon-wrapper bg-purple">
                    <div class="f-ring"></div>
                    <div class="f-ai-eye"></div>
                    <div class="f-chart">
                        <div class="f-bar" style="height: 30px;"></div>
                        <div class="f-bar" style="height: 55px;"></div>
                        <div class="f-bar" style="height: 40px;"></div>
                    </div>
                </div>
                <div class="logo-text text-f">
                    <span class="ai">AI</span><span class="signals">SIGNALS</span>
                </div>
                <p class="desc">粉紫與淺灰組合，<br>智力圓環象徵高科技 AI 分析。</p>
            </div>
        </div>
    </div>
</body>
</html>
