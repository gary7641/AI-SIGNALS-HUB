<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SIGNALS HUB - Logo Variant 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            background: white;
            border-radius: 30px;
            padding: 60px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            color: #1F2937;
            font-size: 2.2em;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #F97316;
            font-size: 1.3em;
            margin-bottom: 50px;
            font-weight: 600;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 50px;
        }

        .logo-icon {
            position: relative;
            width: 120px;
            height: 120px;
        }

        /* Circular waves - orange gradient */
        .signal-wave {
            position: absolute;
            border-radius: 50%;
            border: 4px solid;
            border-color: #F97316;
        }

        .wave-1 {
            width: 120px;
            height: 120px;
            top: 0;
            left: 0;
            opacity: 0.8;
            animation: ripple 2s ease-out infinite;
        }

        .wave-2 {
            width: 95px;
            height: 95px;
            top: 12.5px;
            left: 12.5px;
            opacity: 0.6;
            animation: ripple 2s ease-out infinite 0.4s;
        }

        .wave-3 {
            width: 70px;
            height: 70px;
            top: 25px;
            left: 25px;
            opacity: 0.4;
            animation: ripple 2s ease-out infinite 0.8s;
        }

        @keyframes ripple {
            0% {
                transform: scale(0.7);
                opacity: 1;
            }
            100% {
                transform: scale(1.2);
                opacity: 0;
            }
        }

        /* Center icon with data bars */
        .icon-center {
            position: absolute;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #1F2937 0%, #374151 100%);
            border-radius: 15px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 12px;
            gap: 4px;
            z-index: 10;
        }

        /* Data bars - orange to red gradient */
        .data-bar {
            width: 7px;
            border-radius: 3px;
            background: linear-gradient(to top, #F97316, #EF4444);
            animation: dataFlow 1.8s ease-in-out infinite;
        }

        .bar-1 { height: 18px; animation-delay: 0s; }
        .bar-2 { height: 30px; animation-delay: 0.2s; }
        .bar-3 { height: 22px; animation-delay: 0.4s; }
        .bar-4 { height: 35px; animation-delay: 0.6s; }
        .bar-5 { height: 25px; animation-delay: 0.8s; }

        @keyframes dataFlow {
            0%, 100% { 
                opacity: 0.7;
                transform: scaleY(1);
            }
            50% { 
                opacity: 1;
                transform: scaleY(1.15);
            }
        }

        .logo-text {
            font-size: 2.5em;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo-text .ai {
            color: #F97316;
        }

        .logo-text .signals {
            color: #1F2937;
        }

        .logo-text .hub {
            color: #374151;
        }

        .description {
            text-align: center;
            color: #6B7280;
            font-size: 1em;
            line-height: 1.8;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .feature {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .feature-icon {
            width: 30px;
            height: 30px;
            background: #F97316;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .feature-icon::after {
            content: '✓';
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .feature-content h3 {
            color: #1F2937;
            font-size: 1.1em;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .feature-content p {
            color: #6B7280;
            font-size: 0.95em;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI SIGNALS HUB</h1>
        <div class="subtitle">Signal Data Analyzer - Variant 2</div>
        
        <div class="logo-container">
            <div class="logo-icon">
                <!-- Signal waves -->
                <div class="signal-wave wave-1"></div>
                <div class="signal-wave wave-2"></div>
                <div class="signal-wave wave-3"></div>
                
                <!-- Center icon with data bars -->
                <div class="icon-center">
                    <div class="data-bar bar-1"></div>
                    <div class="data-bar bar-2"></div>
                    <div class="data-bar bar-3"></div>
                    <div class="data-bar bar-4"></div>
                    <div class="data-bar bar-5"></div>
                </div>
            </div>
            
            <div class="logo-text">
                <span class="ai">AI</span> <span class="signals">SIGNALS</span> <span class="hub">HUB</span>
            </div>
        </div>

        <p class="description">
            設計概念：橙色波紋圓圈代表信號廣播，深灰色底座配搭橙紅色柱狀圖代表數據分析。
            簡約現代設計風格，五個動態數據柱展現實時分析能力。
        </p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon"></div>
                <div class="feature-content">
                    <h3>Signal Broadcasting</h3>
                    <p>橙色波紋動畫展現信號傳播</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon"></div>
                <div class="feature-content">
                    <h3>Real-time Analytics</h3>
                    <p>五個動態柱狀圖展現實時數據</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-content">
                    <h3>Professional Design</h3>
                    <p>深灰色配橙色的現代配色</p>
                </div>
            </div>
            <div class="feature">
                <div class="feature-icon"></div>
                <div class="feature-content">
                    <h3>Clean Modern Look</h3>
                    <p>簡約的視覺設計風格</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
